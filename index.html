<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>感謝ジャーナル 🌸</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --pink: #ff8fab; --pink-light: #ffb3c6; --pink-bg: #fff0f4;
      --green: #52b788; --green-light: #b7e4c7; --green-bg: #f0faf4;
      --amber: #ffb347; --amber-light: #ffe0b2;
      --bg: #fff9f5; --card: #ffffff; --text: #5c3d2e;
      --text-sub: #9e7e70; --border: #f0e4dc;
    }
    body { font-family: 'Hiragino Kaku Gothic ProN','Yu Gothic','Noto Sans JP',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; padding-bottom:76px; }

    /* Header */
    .header { background:linear-gradient(135deg,#ff8fab 0%,#ffb347 100%); padding:14px 16px 12px; color:white; text-align:center; box-shadow:0 3px 12px rgba(255,143,171,.3); position:sticky; top:0; z-index:50; }
    .header h1 { font-size:20px; font-weight:bold; letter-spacing:1px; }
    .header-badges { display:flex; justify-content:center; gap:10px; margin-top:8px; flex-wrap:wrap; }
    .badge { background:rgba(255,255,255,.28); padding:3px 10px; border-radius:20px; font-size:11px; font-weight:600; }

    /* Nav */
    .nav { position:fixed; bottom:0; left:0; right:0; background:white; display:flex; box-shadow:0 -2px 16px rgba(0,0,0,.08); z-index:100; }
    .nav-btn { flex:1; display:flex; flex-direction:column; align-items:center; padding:9px 2px 7px; cursor:pointer; color:#c9b8b0; font-size:10px; gap:3px; border:none; background:none; transition:color .2s; }
    .nav-btn .icon { font-size:20px; }
    .nav-btn.active { color:var(--pink); }

    /* Content */
    .content { max-width:620px; margin:0 auto; padding:14px 14px 0; }
    .tab { display:none; } .tab.active { display:block; }

    /* Card */
    .card { background:var(--card); border-radius:18px; padding:16px 16px 18px; margin-bottom:12px; box-shadow:0 2px 12px rgba(0,0,0,.05); border:1px solid var(--border); }
    .card-title { font-size:13px; color:var(--text-sub); margin-bottom:12px; font-weight:700; display:flex; align-items:center; gap:5px; }

    /* Prompt */
    .prompt-box { background:linear-gradient(135deg,#fff0f4,#fff8f0); border:1.5px dashed var(--pink-light); border-radius:14px; padding:14px 16px; margin-bottom:12px; text-align:center; }
    .prompt-emoji { font-size:26px; margin-bottom:4px; }
    .prompt-text { font-size:14px; line-height:1.6; color:var(--text); }

    /* Counter */
    .counter-wrap { display:flex; flex-direction:column; align-items:center; gap:12px; }
    .counter-btn { width:116px; height:116px; background:linear-gradient(145deg,#ff8fab,#ff5c84); color:white; border:none; border-radius:50%; cursor:pointer; font-size:14px; font-weight:bold; box-shadow:0 6px 22px rgba(255,92,132,.4); transition:transform .15s,box-shadow .15s; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:3px; }
    .counter-btn .cicon { font-size:30px; }
    .counter-btn:active { transform:scale(.9); box-shadow:0 3px 10px rgba(255,92,132,.35); }
    .counter-nums { display:flex; gap:28px; }
    .c-num { text-align:center; }
    .c-num .val { font-size:32px; font-weight:bold; color:var(--pink); line-height:1; }
    .c-num .lbl { font-size:11px; color:var(--text-sub); margin-top:2px; }

    /* Form */
    .form-group { margin-bottom:12px; }
    .form-label { font-size:12px; font-weight:700; color:var(--text-sub); margin-bottom:5px; display:block; }
    textarea { width:100%; border:1.5px solid var(--border); border-radius:10px; padding:11px 12px; font-size:15px; font-family:inherit; resize:none; color:var(--text); background:#fffaf7; transition:border-color .2s; }
    textarea:focus { outline:none; border-color:var(--pink-light); }
    .cat-list { display:flex; flex-wrap:wrap; gap:7px; }
    .cat-btn { padding:5px 13px; border-radius:20px; border:1.5px solid var(--border); background:white; cursor:pointer; font-size:13px; color:var(--text); transition:all .2s; }
    .cat-btn.sel { background:var(--green-light); border-color:var(--green); color:var(--green); font-weight:700; }
    .mood-row { display:flex; justify-content:center; gap:8px; }
    .mood-btn { font-size:28px; background:none; border:2px solid transparent; border-radius:50%; width:50px; height:50px; cursor:pointer; transition:all .2s; display:flex; align-items:center; justify-content:center; }
    .mood-btn.sel { border-color:var(--pink); background:var(--pink-bg); transform:scale(1.2); }
    .save-btn { width:100%; background:linear-gradient(135deg,var(--green),#40916c); color:white; border:none; border-radius:12px; padding:14px; font-size:15px; font-weight:bold; cursor:pointer; box-shadow:0 4px 14px rgba(82,183,136,.35); transition:all .2s; }
    .save-btn:active { transform:scale(.98); }

    /* Entry */
    .entry-item { border-left:3px solid var(--pink-light); padding:10px 32px 10px 12px; margin-bottom:8px; background:#fff8f9; border-radius:0 10px 10px 0; position:relative; }
    .entry-text { font-size:14px; line-height:1.6; margin-bottom:5px; }
    .entry-meta { display:flex; gap:7px; align-items:center; flex-wrap:wrap; }
    .entry-cat { font-size:11px; background:var(--green-light); color:var(--green); padding:2px 8px; border-radius:10px; }
    .entry-time { font-size:11px; color:var(--text-sub); }
    .entry-del { position:absolute; top:8px; right:8px; background:none; border:none; color:#ddd; cursor:pointer; font-size:15px; transition:color .2s; }
    .entry-del:hover { color:var(--pink); }
    .sec-title { font-size:15px; font-weight:bold; margin-bottom:10px; display:flex; align-items:center; gap:5px; }
    .empty-state { text-align:center; padding:28px 20px; color:var(--text-sub); }
    .empty-icon { font-size:38px; margin-bottom:8px; }
    .empty-state p { font-size:13px; line-height:1.7; }

    /* ── Quest Tab ── */
    .quest-scene {
      border-radius:14px; overflow:hidden; margin-bottom:16px;
      background:linear-gradient(180deg,#87CEEB 0%,#b0e2ff 52%,#6abf6a 52%,#4a9e4a 100%);
      height:190px; display:flex; align-items:flex-end; justify-content:center;
      padding-bottom:14px; position:relative;
    }
    .quest-scene-cloud { position:absolute; top:14px; left:16px; font-size:22px; opacity:.7; animation:cloudDrift 8s ease-in-out infinite; }
    .quest-scene-cloud2 { position:absolute; top:8px; right:20px; font-size:15px; opacity:.5; animation:cloudDrift 12s ease-in-out infinite 3s; }
    @keyframes cloudDrift { 0%,100%{transform:translateX(0)} 50%{transform:translateX(8px)} }
    .quest-scene-star { position:absolute; font-size:12px; }
    .hero-shadow { width:56px; height:7px; border-radius:50%; background:rgba(0,0,0,.22); position:absolute; bottom:8px; }
    .hero-sprite { image-rendering:pixelated; image-rendering:crisp-edges; animation:heroIdle 1.8s ease-in-out infinite; position:relative; z-index:2; }
    @keyframes heroIdle { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-6px)} }
    .hero-lvup { animation:lvUpPop .55s cubic-bezier(.175,.885,.32,1.275) !important; }
    @keyframes lvUpPop { 0%{transform:scale(1)} 50%{transform:scale(1.45) translateY(-12px)} 100%{transform:scale(1)} }

    .quest-lv-wrap { text-align:center; margin-bottom:14px; }
    .quest-lv-badge { display:inline-block; font-size:12px; font-weight:700; padding:3px 14px; border-radius:14px; margin-bottom:5px; background:linear-gradient(135deg,#a29bfe,#6c5ce7); color:white; letter-spacing:.5px; }
    .quest-lv-name { font-size:22px; font-weight:bold; color:var(--text); }
    .quest-lv-story { font-size:12px; color:var(--text-sub); margin-top:4px; line-height:1.5; }

    .quest-stats { display:flex; flex-direction:column; gap:9px; }
    .qstat-row { display:flex; align-items:center; gap:8px; }
    .qstat-icon { font-size:14px; width:20px; text-align:center; flex-shrink:0; }
    .qstat-lbl  { font-size:11px; font-weight:700; color:var(--text-sub); width:30px; flex-shrink:0; }
    .qstat-track { flex:1; height:12px; background:#e8e8e8; border-radius:6px; overflow:hidden; box-shadow:inset 0 1px 3px rgba(0,0,0,.12); }
    .qstat-fill  { height:100%; border-radius:6px; transition:width .9s cubic-bezier(.4,0,.2,1); }
    .qstat-hp  { background:linear-gradient(90deg,#ff6b6b,#ff8fab); }
    .qstat-atk { background:linear-gradient(90deg,#ffb347,#ff6b00); }
    .qstat-def { background:linear-gradient(90deg,#74b9ff,#0984e3); }
    .qstat-mag { background:linear-gradient(90deg,#a29bfe,#6c5ce7); }
    .qstat-val { font-size:12px; font-weight:bold; width:36px; text-align:right; color:var(--text); font-family:monospace; }

    .quest-progress-wrap { margin-top:14px; }
    .quest-prog-labels { display:flex; justify-content:space-between; font-size:12px; color:var(--text-sub); margin-bottom:5px; }
    .quest-prog-track { height:10px; background:#e8e8e8; border-radius:5px; overflow:hidden; box-shadow:inset 0 1px 3px rgba(0,0,0,.1); }
    .quest-prog-fill  { height:100%; background:linear-gradient(90deg,#a29bfe,#6c5ce7); border-radius:5px; transition:width .9s cubic-bezier(.4,0,.2,1); }

    /* Equipment */
    .equip-list { display:flex; flex-direction:column; gap:9px; }
    .equip-row { display:flex; align-items:center; gap:10px; padding:10px 12px; border-radius:12px; background:#fffaf7; border:1.5px solid var(--border); }
    .equip-icon { font-size:22px; width:34px; text-align:center; flex-shrink:0; }
    .equip-info { flex:1; min-width:0; }
    .equip-info h4 { font-size:13px; font-weight:700; display:flex; align-items:center; gap:6px; }
    .equip-stat { font-size:11px; font-weight:bold; color:#6c5ce7; background:#ede0ff; padding:1px 6px; border-radius:6px; }
    .equip-info p  { font-size:11px; color:var(--text-sub); margin-top:2px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .equip-rarity { font-size:10px; font-weight:700; padding:2px 7px; border-radius:10px; flex-shrink:0; white-space:nowrap; }
    .rarity-common   { background:#eee; color:#888; }
    .rarity-uncommon { background:#d4f1d4; color:#2e7d32; }
    .rarity-rare     { background:#dce8ff; color:#1565c0; }
    .rarity-epic     { background:#ede0ff; color:#6a1b9a; }
    .rarity-legend   { background:linear-gradient(135deg,#fff3cd,#ffe082); color:#e65100; border:1px solid #ffca28; }

    /* Achievements */
    .ach-list { display:flex; flex-direction:column; gap:9px; }
    .ach-item { display:flex; align-items:center; gap:12px; padding:10px 12px; border-radius:12px; background:#fffaf7; border:1.5px solid var(--border); }
    .ach-item.on { background:linear-gradient(135deg,#fff9f0,#fff0f4); border-color:var(--pink-light); }
    .ach-icon { font-size:26px; width:42px; text-align:center; flex-shrink:0; }
    .ach-info h4 { font-size:13px; }
    .ach-info p { font-size:11px; color:var(--text-sub); }
    .ach-item.off .ach-icon { filter:grayscale(1); opacity:.35; }
    .ach-item.off .ach-info { opacity:.45; }

    /* Calendar */
    .cal-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:12px; }
    .cal-nav { background:var(--border); border:none; border-radius:8px; padding:6px 13px; cursor:pointer; font-size:15px; transition:background .2s; }
    .cal-nav:hover { background:var(--pink-light); }
    .cal-title { font-size:17px; font-weight:bold; }
    .cal-grid { display:grid; grid-template-columns:repeat(7,1fr); gap:3px; }
    .cal-dh { text-align:center; font-size:11px; color:var(--text-sub); padding:3px 0; font-weight:700; }
    .cal-d { aspect-ratio:1; display:flex; flex-direction:column; align-items:center; justify-content:center; border-radius:8px; cursor:pointer; font-size:13px; transition:all .15s; position:relative; }
    .cal-d:hover { background:var(--amber-light); }
    .cal-d.has { background:var(--pink-bg); font-weight:700; color:var(--pink); }
    .cal-d.today { background:var(--pink); color:white; font-weight:bold; }
    .cal-d.none { cursor:default; }
    .cal-dot { width:4px; height:4px; background:var(--pink); border-radius:50%; position:absolute; bottom:3px; }
    .cal-d.today .cal-dot { background:white; }

    /* Stats */
    .stats-4 { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:12px; }
    @media(min-width:500px){ .stats-4 { grid-template-columns:repeat(4,1fr); } }
    .stat-box { text-align:center; }
    .stat-big { font-size:38px; font-weight:bold; color:var(--pink); line-height:1; }
    .stat-lbl { font-size:12px; color:var(--text-sub); margin-top:3px; }
    .bar-chart { display:flex; flex-direction:column; gap:8px; }
    .bar-row { display:flex; align-items:center; gap:8px; }
    .bar-lbl { width:64px; font-size:12px; text-align:right; color:var(--text-sub); flex-shrink:0; overflow:hidden; white-space:nowrap; }
    .bar-track { flex:1; height:14px; background:#eee; border-radius:7px; overflow:hidden; }
    .bar-fill { height:100%; background:linear-gradient(90deg,var(--green-light),var(--green)); border-radius:7px; transition:width .8s; min-width:2px; }
    .bar-cnt { font-size:12px; font-weight:700; width:22px; color:var(--text); }

    /* Memory */
    .memory-inner { text-align:center; padding:20px 10px; }
    .mem-date { font-size:13px; color:var(--text-sub); margin-bottom:10px; }
    .mem-text { font-size:19px; line-height:1.7; font-weight:500; margin-bottom:14px; }
    .mem-cat { display:inline-block; font-size:13px; background:var(--green-light); color:var(--green); padding:4px 14px; border-radius:20px; margin-bottom:18px; }
    .shuffle-btn { background:var(--amber-light); border:none; border-radius:12px; padding:11px 22px; font-size:14px; cursor:pointer; color:#a0640a; font-weight:700; transition:all .2s; }
    .shuffle-btn:active { transform:scale(.96); }
    .react-row { display:flex; gap:10px; justify-content:center; margin-top:12px; }
    .react-btn { border:none; border-radius:12px; padding:11px 18px; cursor:pointer; font-size:13px; font-weight:700; transition:all .2s; }
    .react-btn:active { transform:scale(.96); }
    .rb-still { background:var(--green-light); color:var(--green); }
    .rb-new { background:var(--amber-light); color:#a0640a; }

    /* Modal */
    .overlay { position:fixed; inset:0; background:rgba(0,0,0,.38); z-index:200; display:none; align-items:flex-end; }
    .overlay.open { display:flex; }
    .sheet { background:white; border-radius:22px 22px 0 0; padding:20px 16px; width:100%; max-height:72vh; overflow-y:auto; }
    .sheet-title { font-size:17px; font-weight:bold; margin-bottom:14px; display:flex; justify-content:space-between; align-items:center; }
    .sheet-close { background:var(--border); border:none; border-radius:50%; width:28px; height:28px; cursor:pointer; font-size:15px; display:flex; align-items:center; justify-content:center; }

    /* Toast & Particle */
    .toast { position:fixed; top:74px; left:50%; transform:translateX(-50%) translateY(-18px); background:rgba(82,183,136,.95); color:white; padding:11px 22px; border-radius:22px; font-size:13px; font-weight:700; z-index:500; opacity:0; transition:all .3s; white-space:nowrap; box-shadow:0 4px 18px rgba(0,0,0,.14); }
    .toast.show { opacity:1; transform:translateX(-50%) translateY(0); }
    .particle { position:fixed; pointer-events:none; z-index:499; font-size:18px; animation:pfall 1.6s ease-in forwards; }
    @keyframes pfall { 0%{transform:translateY(-10px) rotate(0deg);opacity:1} 100%{transform:translateY(100vh) rotate(400deg);opacity:0} }
  </style>
</head>
<body>

<div class="header">
  <h1>🌸 感謝ジャーナル</h1>
  <div class="header-badges">
    <span class="badge" id="hLevel">⚔️ Lv.1 旅人</span>
    <span class="badge" id="hStreak">🔥 0日連続</span>
    <span class="badge" id="hTotal">🙏 0件</span>
  </div>
</div>

<div class="content">

  <!-- HOME -->
  <div class="tab active" id="tab-home">
    <div class="prompt-box">
      <div class="prompt-emoji" id="promptEmoji">💭</div>
      <div class="prompt-text" id="promptText">今日、誰かに感謝したいことはありましたか？</div>
    </div>
    <div class="card">
      <div class="card-title">🙏 ありがとうカウンター</div>
      <div class="counter-wrap">
        <button class="counter-btn" id="cBtn" onclick="tap()">
          <span class="cicon">🙏</span><span>ありがとう</span>
        </button>
        <div class="counter-nums">
          <div class="c-num"><div class="val" id="cToday">0</div><div class="lbl">今日</div></div>
          <div class="c-num"><div class="val" id="cTotal">0</div><div class="lbl">累計</div></div>
        </div>
      </div>
    </div>
    <div class="card">
      <div class="card-title">✍️ 今日の感謝を記録</div>
      <div class="form-group">
        <label class="form-label">感謝の内容</label>
        <textarea id="eText" rows="3" placeholder="例：美味しいランチが食べられた、友人に助けてもらった…"></textarea>
      </div>
      <div class="form-group">
        <label class="form-label">カテゴリ</label>
        <div class="cat-list" id="catList">
          <button class="cat-btn" onclick="pickCat(this,'👨‍👩‍👧 家族')">👨‍👩‍👧 家族</button>
          <button class="cat-btn" onclick="pickCat(this,'💼 仕事')">💼 仕事</button>
          <button class="cat-btn" onclick="pickCat(this,'👫 友人')">👫 友人</button>
          <button class="cat-btn" onclick="pickCat(this,'🌿 自然')">🌿 自然</button>
          <button class="cat-btn" onclick="pickCat(this,'🍱 食事')">🍱 食事</button>
          <button class="cat-btn" onclick="pickCat(this,'💪 健康')">💪 健康</button>
          <button class="cat-btn" onclick="pickCat(this,'📚 学び')">📚 学び</button>
          <button class="cat-btn" onclick="pickCat(this,'✨ その他')">✨ その他</button>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">今の気分</label>
        <div class="mood-row">
          <button class="mood-btn" onclick="pickMood(this,1)">😐</button>
          <button class="mood-btn" onclick="pickMood(this,2)">🙂</button>
          <button class="mood-btn" onclick="pickMood(this,3)">😊</button>
          <button class="mood-btn" onclick="pickMood(this,4)">😄</button>
          <button class="mood-btn" onclick="pickMood(this,5)">🥰</button>
        </div>
      </div>
      <button class="save-btn" onclick="saveEntry()">🌱 感謝を記録する</button>
    </div>
    <div class="sec-title">📝 今日の記録</div>
    <div id="todayList"></div>
  </div>

  <!-- QUEST -->
  <div class="tab" id="tab-quest">
    <div class="card" id="questCard">
      <div class="card-title">⚔️ 感謝クエスト</div>
      <div class="quest-scene">
        <span class="quest-scene-cloud">☁️</span>
        <span class="quest-scene-cloud2">☁️</span>
        <div class="hero-shadow"></div>
        <div id="heroSprite" class="hero-sprite"></div>
      </div>
      <div class="quest-lv-wrap">
        <div class="quest-lv-badge" id="questLvBadge">Lv.1</div>
        <div class="quest-lv-name"  id="questLvName">旅人</div>
        <div class="quest-lv-story" id="questLvStory">感謝の旅が始まったばかり…</div>
      </div>
      <div class="quest-stats">
        <div class="qstat-row">
          <div class="qstat-icon">❤️</div><div class="qstat-lbl">HP</div>
          <div class="qstat-track"><div class="qstat-fill qstat-hp"  id="qHpBar"  style="width:0%"></div></div>
          <div class="qstat-val" id="qHpVal">20</div>
        </div>
        <div class="qstat-row">
          <div class="qstat-icon">⚔️</div><div class="qstat-lbl">ATK</div>
          <div class="qstat-track"><div class="qstat-fill qstat-atk" id="qAtkBar" style="width:0%"></div></div>
          <div class="qstat-val" id="qAtkVal">5</div>
        </div>
        <div class="qstat-row">
          <div class="qstat-icon">🛡️</div><div class="qstat-lbl">DEF</div>
          <div class="qstat-track"><div class="qstat-fill qstat-def" id="qDefBar" style="width:0%"></div></div>
          <div class="qstat-val" id="qDefVal">3</div>
        </div>
        <div class="qstat-row">
          <div class="qstat-icon">✨</div><div class="qstat-lbl">MAG</div>
          <div class="qstat-track"><div class="qstat-fill qstat-mag" id="qMagBar" style="width:0%"></div></div>
          <div class="qstat-val" id="qMagVal">—</div>
        </div>
      </div>
      <div class="quest-progress-wrap">
        <div class="quest-prog-labels">
          <span id="questProgLabel">次のレベルまで</span>
          <span id="questProgCount">あと1件</span>
        </div>
        <div class="quest-prog-track"><div class="quest-prog-fill" id="questProgBar" style="width:0%"></div></div>
      </div>
    </div>

    <div class="card">
      <div class="card-title">🎒 現在の装備</div>
      <div class="equip-list" id="equipList"></div>
    </div>

    <div class="sec-title">🏆 実績バッジ</div>
    <div class="card"><div class="ach-list" id="achList"></div></div>
  </div>

<script>
// ── Data ──
const KEY = 'kansha_v2';
function load(){ try{ const r=localStorage.getItem(KEY); return r?JSON.parse(r):def(); }catch{return def();} }
function def(){ return {entries:[],tapTotal:0,tapToday:0,tapDate:'',streak:0,best:0,lastDate:''}; }
function save(){ localStorage.setItem(KEY,JSON.stringify(D)); }
let D = load();

// ── Utils ──
const todayStr = () => new Date().toISOString().slice(0,10);
const fmtDate  = s => { const d=new Date(s+'T00:00:00'); return `${d.getFullYear()}年${d.getMonth()+1}月${d.getDate()}日`; };
const fmtTime  = ts => { const d=new Date(ts); return `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`; };
const esc      = s => s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');

function toast(msg, color='rgba(82,183,136,.95)'){
  const t=document.getElementById('toast');
  t.textContent=msg; t.style.background=color;
  t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),2800);
}
function burst(emojis=['🌸','✨','💛','🌿','🎉'],n=8){
  for(let i=0;i<n;i++) setTimeout(()=>{
    const p=document.createElement('div'); p.className='particle';
    p.textContent=emojis[Math.floor(Math.random()*emojis.length)];
    p.style.left=Math.random()*92+'vw'; p.style.top='-20px';
    document.body.appendChild(p); setTimeout(()=>p.remove(),1700);
  },i*100);
}

// ── Counter ──
function tap(){
  const t=todayStr();
  if(D.tapDate!==t){D.tapToday=0;D.tapDate=t;}
  D.tapToday++;D.tapTotal++;save();renderCounter();
  const btn=document.getElementById('cBtn');
  btn.style.transform='scale(.86)'; setTimeout(()=>btn.style.transform='',140);
  if([1,10,50,100,500,1000].includes(D.tapTotal)){
    burst(['🙏','💛','✨','🌸']); toast(`🎉 累計${D.tapTotal}回のありがとうを達成！`);
  }
}
function renderCounter(){
  document.getElementById('cToday').textContent = D.tapDate===todayStr()?D.tapToday:0;
  document.getElementById('cTotal').textContent = D.tapTotal;
}

// ── Form ──
let selCat='',selMood=0;
function pickCat(btn,cat){ document.querySelectorAll('.cat-btn').forEach(b=>b.classList.remove('sel')); btn.classList.add('sel');selCat=cat; }
function pickMood(btn,m){  document.querySelectorAll('.mood-btn').forEach(b=>b.classList.remove('sel')); btn.classList.add('sel');selMood=m; }

// ── Save Entry ──
function saveEntry(){
  const text=document.getElementById('eText').value.trim();
  if(!text){toast('💭 感謝の内容を入力してください','rgba(255,143,171,.95)');return;}

  const prevLv=getLevel(); const prevTier=getTier(prevLv);

  D.entries.unshift({id:Date.now().toString(),date:todayStr(),text,category:selCat||'✨ その他',mood:selMood||3,ts:Date.now()});
  calcStreak();save();

  document.getElementById('eText').value='';
  selCat='';selMood=0;
  document.querySelectorAll('.cat-btn,.mood-btn').forEach(b=>b.classList.remove('sel'));

  renderAll();

  const newLv=getLevel(); const newTier=getTier(newLv);
  if(newLv>prevLv){
    const sprite=document.getElementById('heroSprite');
    if(sprite){sprite.classList.remove('hero-lvup');void sprite.offsetWidth;sprite.classList.add('hero-lvup');setTimeout(()=>sprite.classList.remove('hero-lvup'),600);}
    if(newTier>prevTier){
      burst(['⚔️','🌟','🎊','💎','👑','✨'],14);
      toast(`🎊 職業チェンジ！ ${TIER_NAMES[newTier]} になった！ Lv.${newLv}`,'rgba(183,28,28,.95)');
    } else {
      burst(['⚔️','⭐','🎉','💎','✨'],10);
      toast(`🎉 レベルアップ！ Lv.${newLv} になった！`,'rgba(108,92,231,.95)');
    }
  } else {
    burst();toast('🌸 感謝を記録しました！');
  }
}

function calcStreak(){
  const t=todayStr(); if(D.lastDate===t)return;
  const prev=new Date();prev.setDate(prev.getDate()-1);
  D.streak=D.lastDate===prev.toISOString().slice(0,10)?D.streak+1:1;
  D.best=Math.max(D.best,D.streak); D.lastDate=t;
}
function delEntry(id){D.entries=D.entries.filter(e=>e.id!==id);save();renderTodayList();updateHeader();}

// ── Render Today ──
const moodE=['','😐','🙂','😊','😄','🥰'];
function renderTodayList(){
  const list=D.entries.filter(e=>e.date===todayStr());
  const el=document.getElementById('todayList');
  if(!list.length){el.innerHTML=`<div class="empty-state"><div class="empty-icon">🌸</div><p>まだ今日の記録がありません<br>最初の感謝を記録してみましょう！</p></div>`;return;}
  el.innerHTML=list.map(e=>`<div class="entry-item">
    <button class="entry-del" onclick="delEntry('${e.id}')">✕</button>
    <div class="entry-text">${esc(e.text)}</div>
    <div class="entry-meta"><span class="entry-cat">${e.category}</span><span>${moodE[e.mood]}</span><span class="entry-time">${fmtTime(e.ts)}</span></div>
  </div>`).join('');
}

function updatePrompt(){
  const td=D.entries.filter(e=>e.date===todayStr()).length;
  let p;
  if(td>=5)p={e:'🌟',t:`今日もう${td}つの感謝を記録！素晴らしい一日ですね ✨`};
  else if(td>=1)p=PROMPTS[Math.floor(Math.random()*PROMPTS.length)];
  else p=PROMPTS[0];
  document.getElementById('promptEmoji').textContent=p.e;
  document.getElementById('promptText').textContent=p.t;
}

// ════════════════════════════════════════════
const MAX_LV = 99;

// 感謝記録数 → レベル到達に必要な件数
function reqEntries(lv){
  if(lv<=1) return 0;
  return Math.floor(Math.pow(lv-1,2)*0.15+(lv-1)*1.5);
}
// 現在のレベル (1〜99)
function getLevel(){
  const n=D.entries.length;
  for(let lv=MAX_LV;lv>=2;lv--){ if(n>=reqEntries(lv)) return lv; }
  return 1;
}
// ティア (0〜9) : 10レベルごとに職業変化
function getTier(lv){
  if(lv>=90) return 9;
  return Math.floor((lv-1)/10);
}
// ステータス計算
function getLvStats(lv){
  return {
    hp:  20+(lv-1)*8,
    atk:  5+(lv-1)*3,
    def:  3+(lv-1)*2,
    mag:  lv>=10?(lv-9)*2:0,
  };
}
// 次レベルまでの進捗
function getLvProgress(lv){
  if(lv>=MAX_LV) return {pct:100,remaining:0};
  const curr=reqEntries(lv), next=reqEntries(lv+1), n=D.entries.length;
  return {pct:Math.min(100,((n-curr)/(next-curr)*100)).toFixed(0), remaining:next-n};
}

function buildHeroSVG(tier){
  const P=9, theme=LEVEL_THEMES[Math.min(tier,9)];
  const C=[null,theme.h,theme.s,theme.e,theme.m,theme.a,theme.g,theme.l,theme.b,theme.d,theme.v];
  let r='';
  PIXEL_MAP.forEach((row,y)=>row.forEach((c,x)=>{ if(!c)return; r+=`<rect x="${x*P}" y="${y*P}" width="${P}" height="${P}" fill="${C[c]}"/>`; }));
  return `<svg width="${16*P}" height="${20*P}" viewBox="0 0 ${16*P} ${20*P}" xmlns="http://www.w3.org/2000/svg" style="image-rendering:pixelated">${r}</svg>`;
}

// ── renderQuest ──
const RARITY_LABEL={common:'ノーマル',uncommon:'アンコモン',rare:'レア',epic:'エピック',legend:'レジェンド'};

function renderQuest(){
  const lv=getLevel(), tier=getTier(lv);
  const stats=getLvStats(lv), maxS=getLvStats(MAX_LV), prog=getLvProgress(lv);
  const equip=EQUIP_TIERS[tier];

  document.getElementById('heroSprite').innerHTML=buildHeroSVG(tier);
  document.getElementById('questLvBadge').textContent=`Lv.${lv}`;
  document.getElementById('questLvName').textContent=TIER_NAMES[tier];
  document.getElementById('questLvStory').textContent=TIER_STORIES[tier];

  document.getElementById('qHpBar').style.width =(stats.hp /maxS.hp *100)+'%';
  document.getElementById('qAtkBar').style.width=(stats.atk/maxS.atk*100)+'%';
  document.getElementById('qDefBar').style.width=(stats.def/maxS.def*100)+'%';
  document.getElementById('qMagBar').style.width=(maxS.mag>0?Math.max(0,stats.mag/maxS.mag*100):0)+'%';
  document.getElementById('qHpVal').textContent =stats.hp;
  document.getElementById('qAtkVal').textContent=stats.atk;
  document.getElementById('qDefVal').textContent=stats.def;
  document.getElementById('qMagVal').textContent=stats.mag>0?stats.mag:'—';

  if(lv<MAX_LV){
    document.getElementById('questProgLabel').textContent=`次のLv.${lv+1}まで`;
    document.getElementById('questProgCount').textContent=`あと${prog.remaining}件`;
    document.getElementById('questProgBar').style.width=prog.pct+'%';
  } else {
    document.getElementById('questProgLabel').textContent='🎉 Lv.99 最高位到達！';
    document.getElementById('questProgCount').textContent=`${D.entries.length}件`;
    document.getElementById('questProgBar').style.width='100%';
  }

  document.getElementById('equipList').innerHTML=[
    {slot:'⚔️ 武器',item:equip.weapon},
    {slot:'🛡️ 防具',item:equip.armor},
    {slot:'🔰 盾',  item:equip.shield},
    {slot:'✨ 魔法', item:equip.magic},
  ].map(({slot,item})=>`<div class="equip-row">
    <div class="equip-icon">${item.icon}</div>
    <div class="equip-info">
      <h4>${item.name} <span class="equip-stat">${item.stat}</span></h4>
      <p>${slot} — ${item.desc}</p>
    </div>
    <div class="equip-rarity rarity-${item.r}">${RARITY_LABEL[item.r]}</div>
  </div>`).join('');

  renderAchs();
}

// ── Calendar ──
let calY=new Date().getFullYear(),calM=new Date().getMonth();
const MON=['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];
function renderCal(){
  document.getElementById('calTitle').textContent=`${calY}年 ${MON[calM]}`;
  const eDates=new Set(D.entries.map(e=>e.date)),t=todayStr();
  const firstDay=new Date(calY,calM,1).getDay(),dim=new Date(calY,calM+1,0).getDate();
  let h=['日','月','火','水','木','金','土'].map(d=>`<div class="cal-dh">${d}</div>`).join('');
  for(let i=0;i<firstDay;i++) h+=`<div class="cal-d none"></div>`;
  for(let d=1;d<=dim;d++){
    const ds=`${calY}-${String(calM+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const isT=ds===t,hasE=eDates.has(ds);
    h+=`<div class="cal-d ${isT?'today':hasE?'has':''}" onclick="showDay('${ds}')">${d}${hasE&&!isT?'<div class="cal-dot"></div>':''}</div>`;
  }
  document.getElementById('calGrid').innerHTML=h;
}
function moveMon(d){ calM+=d; if(calM<0){calM=11;calY--;} if(calM>11){calM=0;calY++;} renderCal(); }
function showDay(ds){
  const es=D.entries.filter(e=>e.date===ds); if(!es.length)return;
  document.getElementById('sheetDate').textContent=fmtDate(ds)+`（${es.length}件）`;
  document.getElementById('sheetEntries').innerHTML=es.map(e=>`<div class="entry-item">
    <div class="entry-text">${esc(e.text)}</div>
    <div class="entry-meta"><span class="entry-cat">${e.category}</span><span>${moodE[e.mood]}</span><span class="entry-time">${fmtTime(e.ts)}</span></div>
  </div>`).join('');
  document.getElementById('overlay').classList.add('open');
}
function closeOverlay(ev){ if(ev.target===document.getElementById('overlay'))document.getElementById('overlay').classList.remove('open'); }
function closeOverlayDirect(){ document.getElementById('overlay').classList.remove('open'); }

// ── Stats ──
function renderStats(){
  document.getElementById('statsGrid').innerHTML=[
    {v:D.entries.length,l:'感謝の総数'},{v:D.streak,l:'現在のストリーク'},
    {v:D.best,l:'最高ストリーク'},{v:D.tapTotal,l:'ありがとう回数'},
  ].map(s=>`<div class="card stat-box"><div class="stat-big">${s.v}</div><div class="stat-lbl">${s.l}</div></div>`).join('');
  const cc={};D.entries.forEach(e=>{cc[e.category]=(cc[e.category]||0)+1;});
  const maxC=Math.max(...Object.values(cc),1),sorted=Object.entries(cc).sort((a,b)=>b[1]-a[1]);
  document.getElementById('catChart').innerHTML=sorted.length
    ?sorted.map(([c,v])=>{const lbl=c.split(' ').slice(1).join(' ')||c;return `<div class="bar-row"><div class="bar-lbl">${lbl}</div><div class="bar-track"><div class="bar-fill" style="width:${(v/maxC*100).toFixed(1)}%"></div></div><div class="bar-cnt">${v}</div></div>`;}).join('')
    :'<p style="color:var(--text-sub);font-size:13px;text-align:center;padding:8px">まだ記録がありません</p>';
  const mc=[0,0,0,0,0,0];D.entries.forEach(e=>{if(e.mood>=1&&e.mood<=5)mc[e.mood]++;});
  const maxM=Math.max(...mc,1);
  document.getElementById('moodChart').innerHTML=[1,2,3,4,5].map(m=>
    `<div class="bar-row"><div class="bar-lbl">${moodE[m]}</div><div class="bar-track"><div class="bar-fill" style="width:${(mc[m]/maxM*100).toFixed(1)}%"></div></div><div class="bar-cnt">${mc[m]}</div></div>`
  ).join('');
}

// ── Memory ──
function renderMemory(){
  const past=D.entries.filter(e=>e.date!==todayStr());
  if(!past.length){
    document.getElementById('memCard').innerHTML=`<div class="empty-state"><div class="empty-icon">💫</div><p>記録を増やすと、過去の感謝がここに現れます</p></div>`;
    document.getElementById('memReact').style.display='none';
    document.getElementById('memHistory').textContent='記録がありません';
    return;
  }
  const e=past[Math.floor(Math.random()*past.length)];
  document.getElementById('memCard').innerHTML=`<div class="memory-inner">
    <div class="mem-date">${fmtDate(e.date)} の感謝</div>
    <div class="mem-text">${esc(e.text)}</div>
    <div class="mem-cat">${e.category} ${moodE[e.mood]}</div>
    <button class="shuffle-btn" onclick="renderMemory()">🔀 別の記憶を見る</button>
  </div>`;
  document.getElementById('memReact').style.display='block';
  const dg={};D.entries.forEach(e=>{const m=e.date.slice(0,7);if(!dg[m])dg[m]=new Set();dg[m].add(e.date);});
  document.getElementById('memHistory').innerHTML=Object.entries(dg).sort().reverse().slice(0,8).map(([m,s])=>{
    const [y,mo]=m.split('-');const ds=[...s].sort().map(d=>parseInt(d.slice(8))).join('日、')+'日';
    return `<strong>${y}年${MON[parseInt(mo)-1]}</strong>：${ds}`;
  }).join('<br>')||'記録がありません';
}
function reactMem(type){
  if(type==='still'){burst(['💛','✨','🙏']);toast('💛 素敵！感謝はずっと続いていますね');}
  else{switchTab('home',document.querySelector('.nav-btn'));toast('🌱 新しい感謝を記録しましょう！');}
}

// ── Navigation ──
function switchTab(tab,btn){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('tab-'+tab).classList.add('active');
  btn.classList.add('active');
  if(tab==='quest')    renderQuest();
  if(tab==='calendar') renderCal();
  if(tab==='stats')    renderStats();
  if(tab==='memory')   renderMemory();
}

// ── renderAll ──
function renderAll(){
  renderCounter();updateHeader();renderTodayList();updatePrompt();
  if(document.getElementById('tab-quest').classList.contains('active')) renderQuest();
}

// ── Init ──
(function init(){
  if(D.tapDate!==todayStr()) D.tapToday=0;
  renderAll();renderCal();
})();
