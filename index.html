<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>感謝ジャーナル 🌸</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --pink: #ff8fab;
      --pink-light: #ffb3c6;
      --pink-bg: #fff0f4;
      --green: #52b788;
      --green-light: #b7e4c7;
      --green-bg: #f0faf4;
      --amber: #ffb347;
      --amber-light: #ffe0b2;
      --bg: #fff9f5;
      --card: #ffffff;
      --text: #5c3d2e;
      --text-sub: #9e7e70;
      --border: #f0e4dc;
    }

    body {
      font-family: 'Hiragino Kaku Gothic ProN', 'Yu Gothic', 'Noto Sans JP', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding-bottom: 76px;
    }

    /* ── Header ── */
    .header {
      background: linear-gradient(135deg, #ff8fab 0%, #ffb347 100%);
      padding: 14px 16px 12px;
      color: white;
      text-align: center;
      box-shadow: 0 3px 12px rgba(255,143,171,0.3);
      position: sticky;
      top: 0;
      z-index: 50;
    }
    .header h1 { font-size: 20px; font-weight: bold; letter-spacing: 1px; }
    .header-badges {
      display: flex; justify-content: center; gap: 12px;
      margin-top: 8px; flex-wrap: wrap;
    }
    .badge {
      background: rgba(255,255,255,0.28);
      padding: 3px 12px; border-radius: 20px;
      font-size: 12px; font-weight: 600;
    }

    /* ── Navigation ── */
    .nav {
      position: fixed; bottom: 0; left: 0; right: 0;
      background: white;
      display: flex;
      box-shadow: 0 -2px 16px rgba(0,0,0,0.08);
      z-index: 100;
    }
    .nav-btn {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; padding: 9px 2px 7px;
      cursor: pointer; color: #c9b8b0;
      font-size: 10px; gap: 3px;
      border: none; background: none; transition: color 0.2s;
    }
    .nav-btn .icon { font-size: 20px; }
    .nav-btn.active { color: var(--pink); }

    /* ── Content ── */
    .content { max-width: 620px; margin: 0 auto; padding: 14px 14px 0; }
    .tab { display: none; }
    .tab.active { display: block; }

    /* ── Card ── */
    .card {
      background: var(--card); border-radius: 18px;
      padding: 16px 16px 18px; margin-bottom: 12px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.05);
      border: 1px solid var(--border);
    }
    .card-title {
      font-size: 13px; color: var(--text-sub);
      margin-bottom: 12px; font-weight: 700;
      display: flex; align-items: center; gap: 5px;
    }

    /* ── Prompt box ── */
    .prompt-box {
      background: linear-gradient(135deg, #fff0f4, #fff8f0);
      border: 1.5px dashed var(--pink-light);
      border-radius: 14px; padding: 14px 16px;
      margin-bottom: 12px; text-align: center;
    }
    .prompt-emoji { font-size: 26px; margin-bottom: 4px; }
    .prompt-text { font-size: 14px; line-height: 1.6; color: var(--text); }

    /* ── Counter ── */
    .counter-wrap { display: flex; flex-direction: column; align-items: center; gap: 12px; }
    .counter-btn {
      width: 116px; height: 116px;
      background: linear-gradient(145deg, #ff8fab, #ff5c84);
      color: white; border: none; border-radius: 50%;
      cursor: pointer; font-size: 14px; font-weight: bold;
      box-shadow: 0 6px 22px rgba(255,92,132,0.4);
      transition: transform 0.15s, box-shadow 0.15s;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 3px;
    }
    .counter-btn .cicon { font-size: 30px; }
    .counter-btn:active { transform: scale(0.9); box-shadow: 0 3px 10px rgba(255,92,132,0.35); }
    .counter-nums { display: flex; gap: 28px; }
    .c-num { text-align: center; }
    .c-num .val { font-size: 32px; font-weight: bold; color: var(--pink); line-height: 1; }
    .c-num .lbl { font-size: 11px; color: var(--text-sub); margin-top: 2px; }

    /* ── Form ── */
    .form-group { margin-bottom: 12px; }
    .form-label { font-size: 12px; font-weight: 700; color: var(--text-sub); margin-bottom: 5px; display: block; }
    textarea {
      width: 100%; border: 1.5px solid var(--border); border-radius: 10px;
      padding: 11px 12px; font-size: 15px; font-family: inherit;
      resize: none; color: var(--text); background: #fffaf7; transition: border-color 0.2s;
    }
    textarea:focus { outline: none; border-color: var(--pink-light); }

    .cat-list { display: flex; flex-wrap: wrap; gap: 7px; }
    .cat-btn {
      padding: 5px 13px; border-radius: 20px;
      border: 1.5px solid var(--border); background: white;
      cursor: pointer; font-size: 13px; color: var(--text); transition: all 0.2s;
    }
    .cat-btn.sel { background: var(--green-light); border-color: var(--green); color: var(--green); font-weight: 700; }

    .mood-row { display: flex; justify-content: center; gap: 8px; }
    .mood-btn {
      font-size: 28px; background: none;
      border: 2px solid transparent; border-radius: 50%;
      width: 50px; height: 50px; cursor: pointer;
      transition: all 0.2s; display: flex; align-items: center; justify-content: center;
    }
    .mood-btn.sel { border-color: var(--pink); background: var(--pink-bg); transform: scale(1.2); }

    .save-btn {
      width: 100%; background: linear-gradient(135deg, var(--green), #40916c);
      color: white; border: none; border-radius: 12px;
      padding: 14px; font-size: 15px; font-weight: bold;
      cursor: pointer; box-shadow: 0 4px 14px rgba(82,183,136,0.35); transition: all 0.2s;
    }
    .save-btn:active { transform: scale(0.98); }

    /* ── Entry item ── */
    .entry-item {
      border-left: 3px solid var(--pink-light);
      padding: 10px 32px 10px 12px; margin-bottom: 8px;
      background: #fff8f9; border-radius: 0 10px 10px 0;
      position: relative;
    }
    .entry-text { font-size: 14px; line-height: 1.6; margin-bottom: 5px; }
    .entry-meta { display: flex; gap: 7px; align-items: center; flex-wrap: wrap; }
    .entry-cat { font-size: 11px; background: var(--green-light); color: var(--green); padding: 2px 8px; border-radius: 10px; }
    .entry-time { font-size: 11px; color: var(--text-sub); }
    .entry-del { position: absolute; top: 8px; right: 8px; background: none; border: none; color: #ddd; cursor: pointer; font-size: 15px; transition: color 0.2s; }
    .entry-del:hover { color: var(--pink); }

    .sec-title { font-size: 15px; font-weight: bold; margin-bottom: 10px; display: flex; align-items: center; gap: 5px; }

    .empty-state { text-align: center; padding: 28px 20px; color: var(--text-sub); }
    .empty-icon { font-size: 38px; margin-bottom: 8px; }
    .empty-state p { font-size: 13px; line-height: 1.7; }

    /* ── Tree tab ── */
    .tree-center { text-align: center; padding: 6px 0 0; }
    .tree-lv-name { font-size: 22px; font-weight: bold; color: var(--green); }
    .tree-lv-desc { font-size: 13px; color: var(--text-sub); margin: 4px 0 8px; }
    .progress-track { height: 9px; background: #eee; border-radius: 5px; overflow: hidden; margin: 6px 0 4px; }
    .progress-fill { height: 100%; background: linear-gradient(90deg, var(--green-light), var(--green)); border-radius: 5px; transition: width 0.6s; }
    .progress-msg { font-size: 12px; color: var(--text-sub); text-align: right; }
    .tree-svg { width: 100%; max-width: 260px; height: 260px; }

    /* ── Achievements ── */
    .ach-list { display: flex; flex-direction: column; gap: 9px; }
    .ach-item {
      display: flex; align-items: center; gap: 12px;
      padding: 10px 12px; border-radius: 12px;
      background: #fffaf7; border: 1.5px solid var(--border);
    }
    .ach-item.on { background: linear-gradient(135deg, #fff9f0, #fff0f4); border-color: var(--pink-light); }
    .ach-icon { font-size: 26px; width: 42px; text-align: center; flex-shrink: 0; }
    .ach-info h4 { font-size: 13px; }
    .ach-info p { font-size: 11px; color: var(--text-sub); }
    .ach-item.off .ach-icon { filter: grayscale(1); opacity: 0.35; }
    .ach-item.off .ach-info { opacity: 0.45; }

    /* ── Calendar ── */
    .cal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
    .cal-nav { background: var(--border); border: none; border-radius: 8px; padding: 6px 13px; cursor: pointer; font-size: 15px; transition: background 0.2s; }
    .cal-nav:hover { background: var(--pink-light); }
    .cal-title { font-size: 17px; font-weight: bold; }
    .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 3px; }
    .cal-dh { text-align: center; font-size: 11px; color: var(--text-sub); padding: 3px 0; font-weight: 700; }
    .cal-d {
      aspect-ratio: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      border-radius: 8px; cursor: pointer; font-size: 13px;
      transition: all 0.15s; position: relative;
    }
    .cal-d:hover { background: var(--amber-light); }
    .cal-d.has { background: var(--pink-bg); font-weight: 700; color: var(--pink); }
    .cal-d.today { background: var(--pink); color: white; font-weight: bold; }
    .cal-d.none { cursor: default; }
    .cal-dot { width: 4px; height: 4px; background: var(--pink); border-radius: 50%; position: absolute; bottom: 3px; }
    .cal-d.today .cal-dot { background: white; }

    /* ── Stats ── */
    .stats-4 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 12px; }
    @media(min-width:500px){ .stats-4 { grid-template-columns: repeat(4,1fr); } }
    .stat-box { text-align: center; }
    .stat-big { font-size: 38px; font-weight: bold; color: var(--pink); line-height: 1; }
    .stat-lbl { font-size: 12px; color: var(--text-sub); margin-top: 3px; }
    .bar-chart { display: flex; flex-direction: column; gap: 8px; }
    .bar-row { display: flex; align-items: center; gap: 8px; }
    .bar-lbl { width: 64px; font-size: 12px; text-align: right; color: var(--text-sub); flex-shrink: 0; overflow: hidden; white-space: nowrap; }
    .bar-track { flex: 1; height: 14px; background: #eee; border-radius: 7px; overflow: hidden; }
    .bar-fill { height: 100%; background: linear-gradient(90deg, var(--green-light), var(--green)); border-radius: 7px; transition: width 0.8s; min-width: 2px; }
    .bar-cnt { font-size: 12px; font-weight: 700; width: 22px; color: var(--text); }

    /* ── Memory tab ── */
    .memory-inner { text-align: center; padding: 20px 10px; }
    .mem-date { font-size: 13px; color: var(--text-sub); margin-bottom: 10px; }
    .mem-text { font-size: 19px; line-height: 1.7; font-weight: 500; margin-bottom: 14px; }
    .mem-cat { display: inline-block; font-size: 13px; background: var(--green-light); color: var(--green); padding: 4px 14px; border-radius: 20px; margin-bottom: 18px; }
    .shuffle-btn {
      background: var(--amber-light); border: none; border-radius: 12px;
      padding: 11px 22px; font-size: 14px; cursor: pointer;
      color: #a0640a; font-weight: 700; transition: all 0.2s;
    }
    .shuffle-btn:active { transform: scale(0.96); }
    .react-row { display: flex; gap: 10px; justify-content: center; margin-top: 12px; }
    .react-btn {
      border: none; border-radius: 12px; padding: 11px 18px;
      cursor: pointer; font-size: 13px; font-weight: 700; transition: all 0.2s;
    }
    .react-btn:active { transform: scale(0.96); }
    .rb-still { background: var(--green-light); color: var(--green); }
    .rb-new { background: var(--amber-light); color: #a0640a; }

    /* ── Modal sheet ── */
    .overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.38);
      z-index: 200; display: none; align-items: flex-end;
    }
    .overlay.open { display: flex; }
    .sheet {
      background: white; border-radius: 22px 22px 0 0;
      padding: 20px 16px; width: 100%; max-height: 72vh; overflow-y: auto;
    }
    .sheet-title { font-size: 17px; font-weight: bold; margin-bottom: 14px; display: flex; justify-content: space-between; align-items: center; }
    .sheet-close { background: var(--border); border: none; border-radius: 50%; width: 28px; height: 28px; cursor: pointer; font-size: 15px; display: flex; align-items: center; justify-content: center; }

    /* ── Toast ── */
    .toast {
      position: fixed; top: 74px; left: 50%;
      transform: translateX(-50%) translateY(-18px);
      background: rgba(82,183,136,0.95); color: white;
      padding: 11px 22px; border-radius: 22px;
      font-size: 13px; font-weight: 700; z-index: 500;
      opacity: 0; transition: all 0.3s; white-space: nowrap;
      box-shadow: 0 4px 18px rgba(0,0,0,0.14);
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* ── Particle ── */
    .particle {
      position: fixed; pointer-events: none; z-index: 499;
      font-size: 18px; animation: pfall 1.6s ease-in forwards;
    }
    @keyframes pfall {
      0%   { transform: translateY(-10px) rotate(0deg); opacity: 1; }
      100% { transform: translateY(100vh) rotate(400deg); opacity: 0; }
    }
  </style>
</head>
<body>

<!-- Header -->
<div class="header">
  <h1>🌸 感謝ジャーナル</h1>
  <div class="header-badges">
    <span class="badge" id="hStreak">🔥 0日連続</span>
    <span class="badge" id="hTotal">🙏 0件の感謝</span>
    <span class="badge" id="hTodayCount">✍️ 今日0件</span>
  </div>
</div>

<!-- Content -->
<div class="content">

  <!-- ===== HOME TAB ===== -->
  <div class="tab active" id="tab-home">

    <!-- Daily Prompt -->
    <div class="prompt-box">
      <div class="prompt-emoji" id="promptEmoji">💭</div>
      <div class="prompt-text" id="promptText">今日、誰かに感謝したいことはありましたか？</div>
    </div>

    <!-- Counter -->
    <div class="card">
      <div class="card-title">🙏 ありがとうカウンター</div>
      <div class="counter-wrap">
        <button class="counter-btn" id="cBtn" onclick="tap()">
          <span class="cicon">🙏</span>
          <span>ありがとう</span>
        </button>
        <div class="counter-nums">
          <div class="c-num"><div class="val" id="cToday">0</div><div class="lbl">今日</div></div>
          <div class="c-num"><div class="val" id="cTotal">0</div><div class="lbl">累計</div></div>
        </div>
      </div>
    </div>

    <!-- Entry form -->
    <div class="card">
      <div class="card-title">✍️ 今日の感謝を記録</div>
      <div class="form-group">
        <label class="form-label">感謝の内容</label>
        <textarea id="eText" rows="3" placeholder="例：美味しいランチが食べられた、友人に助けてもらった…"></textarea>
      </div>
      <div class="form-group">
        <label class="form-label">カテゴリ</label>
        <div class="cat-list" id="catList">
          <button class="cat-btn" onclick="pickCat(this,'👨‍👩‍👧 家族')">👨‍👩‍👧 家族</button>
          <button class="cat-btn" onclick="pickCat(this,'💼 仕事')">💼 仕事</button>
          <button class="cat-btn" onclick="pickCat(this,'👫 友人')">👫 友人</button>
          <button class="cat-btn" onclick="pickCat(this,'🌿 自然')">🌿 自然</button>
          <button class="cat-btn" onclick="pickCat(this,'🍱 食事')">🍱 食事</button>
          <button class="cat-btn" onclick="pickCat(this,'💪 健康')">💪 健康</button>
          <button class="cat-btn" onclick="pickCat(this,'📚 学び')">📚 学び</button>
          <button class="cat-btn" onclick="pickCat(this,'✨ その他')">✨ その他</button>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">今の気分</label>
        <div class="mood-row">
          <button class="mood-btn" onclick="pickMood(this,1)">😐</button>
          <button class="mood-btn" onclick="pickMood(this,2)">🙂</button>
          <button class="mood-btn" onclick="pickMood(this,3)">😊</button>
          <button class="mood-btn" onclick="pickMood(this,4)">😄</button>
          <button class="mood-btn" onclick="pickMood(this,5)">🥰</button>
        </div>
      </div>
      <button class="save-btn" onclick="saveEntry()">🌱 感謝を記録する</button>
    </div>

    <!-- Today's entries -->
    <div class="sec-title">📝 今日の記録</div>
    <div id="todayList"></div>
  </div>

  <!-- ===== TREE TAB ===== -->
  <div class="tab" id="tab-tree">
    <div class="card">
      <div class="card-title">🌳 感謝の木</div>
      <div class="tree-center">
        <div class="tree-lv-name" id="treeName">レベル1：種</div>
        <div class="tree-lv-desc" id="treeDesc">感謝の種が芽吹こうとしています</div>
        <div class="progress-track"><div class="progress-fill" id="treeProg" style="width:0%"></div></div>
        <div class="progress-msg" id="treeNext"></div>
        <div id="treeSvg"></div>
      </div>
    </div>
    <div class="sec-title">🏆 実績バッジ</div>
    <div class="card">
      <div class="ach-list" id="achList"></div>
    </div>
  </div>

  <!-- ===== CALENDAR TAB ===== -->
  <div class="tab" id="tab-calendar">
    <div class="card">
      <div class="cal-header">
        <button class="cal-nav" onclick="moveMon(-1)">◀</button>
        <div class="cal-title" id="calTitle"></div>
        <button class="cal-nav" onclick="moveMon(1)">▶</button>
      </div>
      <div class="cal-grid" id="calGrid"></div>
    </div>
    <div id="calDetail"></div>
  </div>

  <!-- ===== STATS TAB ===== -->
  <div class="tab" id="tab-stats">
    <div class="stats-4" id="statsGrid"></div>
    <div class="card">
      <div class="card-title">📊 カテゴリ別感謝</div>
      <div class="bar-chart" id="catChart"></div>
    </div>
    <div class="card">
      <div class="card-title">😊 気分スコアの分布</div>
      <div class="bar-chart" id="moodChart"></div>
    </div>
  </div>

  <!-- ===== MEMORY TAB ===== -->
  <div class="tab" id="tab-memory">
    <div class="card" id="memCard">
      <div class="empty-state">
        <div class="empty-icon">💫</div>
        <p>記録を増やすと、過去の感謝が<br>ここに現れます</p>
      </div>
    </div>
    <div class="card" id="memReact" style="display:none">
      <div class="card-title">💭 この感謝、今でも感じますか？</div>
      <div class="react-row">
        <button class="react-btn rb-still" onclick="reactMem('still')">✨ まだ感じる</button>
        <button class="react-btn rb-new" onclick="reactMem('new')">🌱 新しい感謝を記録</button>
      </div>
    </div>
    <div class="card">
      <div class="card-title">📅 記録のある月</div>
      <div id="memHistory" style="font-size:13px; color:var(--text-sub); line-height:2.1;"></div>
    </div>
  </div>
</div>

<!-- Calendar day modal -->
<div class="overlay" id="overlay" onclick="closeOverlay(event)">
  <div class="sheet">
    <div class="sheet-title">
      <span id="sheetDate"></span>
      <button class="sheet-close" onclick="closeOverlayDirect()">✕</button>
    </div>
    <div id="sheetEntries"></div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<!-- Nav -->
<nav class="nav">
  <button class="nav-btn active" onclick="switchTab('home',this)"><span class="icon">🏠</span><span>ホーム</span></button>
  <button class="nav-btn" onclick="switchTab('tree',this)"><span class="icon">🌳</span><span>感謝の木</span></button>
  <button class="nav-btn" onclick="switchTab('calendar',this)"><span class="icon">📅</span><span>カレンダー</span></button>
  <button class="nav-btn" onclick="switchTab('stats',this)"><span class="icon">📊</span><span>統計</span></button>
  <button class="nav-btn" onclick="switchTab('memory',this)"><span class="icon">💫</span><span>あの日</span></button>
</nav>

<script>
// ─────────────────────────────────────────────
//  Data
// ─────────────────────────────────────────────
const KEY = 'kansha_v2';

function load() {
  try {
    const r = localStorage.getItem(KEY);
    return r ? JSON.parse(r) : def();
  } catch { return def(); }
}
function def() {
  return { entries:[], tapTotal:0, tapToday:0, tapDate:'', streak:0, best:0, lastDate:'' };
}
function save() { localStorage.setItem(KEY, JSON.stringify(D)); }

let D = load();

// ─────────────────────────────────────────────
//  Utils
// ─────────────────────────────────────────────
const todayStr = () => new Date().toISOString().slice(0,10);
const fmtDate = s => { const d = new Date(s+'T00:00:00'); return `${d.getFullYear()}年${d.getMonth()+1}月${d.getDate()}日`; };
const fmtTime = ts => { const d = new Date(ts); return `${d.getHours().toString().padStart(2,'0')}:${d.getMinutes().toString().padStart(2,'0')}`; };
const esc = s => s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');

function toast(msg, color='rgba(82,183,136,0.95)') {
  const t = document.getElementById('toast');
  t.textContent = msg; t.style.background = color;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2600);
}

function burst(emojis=['🌸','✨','💛','🌿','🎉'], n=8) {
  for (let i=0; i<n; i++) {
    setTimeout(() => {
      const p = document.createElement('div');
      p.className = 'particle';
      p.textContent = emojis[Math.floor(Math.random()*emojis.length)];
      p.style.left = Math.random()*92+'vw';
      p.style.top = '-20px';
      document.body.appendChild(p);
      setTimeout(() => p.remove(), 1700);
    }, i * 110);
  }
}

function tap() {
  const t = todayStr();
  if (D.tapDate !== t) { D.tapToday = 0; D.tapDate = t; }
  D.tapToday++; D.tapTotal++;
  save(); renderCounter();

  const btn = document.getElementById('cBtn');
  btn.style.transform = 'scale(0.86)';
  setTimeout(() => btn.style.transform = '', 140);

  const milestones = [1,10,50,100,500,1000];
  if (milestones.includes(D.tapTotal)) {
    burst(['🙏','💛','✨','🌸']); toast(`🎉 累計${D.tapTotal}回のありがとうを達成！`);
  }
}

function renderCounter() {
  const t = todayStr();
  document.getElementById('cToday').textContent = D.tapDate === t ? D.tapToday : 0;
  document.getElementById('cTotal').textContent = D.tapTotal;
}

//  Save entry
// ─────────────────────────────────────────────
function saveEntry() {
  const text = document.getElementById('eText').value.trim();
  if (!text) { toast('💭 感謝の内容を入力してください', 'rgba(255,143,171,0.95)'); return; }

  const entry = {
    id: Date.now().toString(), date: todayStr(),
    text, category: selCat || '✨ その他', mood: selMood || 3,
    ts: Date.now()
  };
  D.entries.unshift(entry);
  calcStreak();
  save();

  // Reset form
  document.getElementById('eText').value = '';
  selCat = ''; selMood = 0;
  document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('sel'));
  document.querySelectorAll('.mood-btn').forEach(b => b.classList.remove('sel'));

  renderAll();
  burst(); toast('🌸 感謝を記録しました！');
}

function calcStreak() {
  const t = todayStr();
  if (D.lastDate === t) return;
  const prev = new Date(); prev.setDate(prev.getDate()-1);
  const yest = prev.toISOString().slice(0,10);
  D.streak = D.lastDate === yest ? D.streak + 1 : 1;
  D.best = Math.max(D.best, D.streak);
  D.lastDate = t;
}

function delEntry(id) {
  D.entries = D.entries.filter(e => e.id !== id);
  save(); renderTodayList(); updateHeader();
}

    msg = `次のレベルまであと${nx.min - n}件`;
  } else { pct = 100; msg = '最高レベルに到達しました！'; }

  document.getElementById('treeProg').style.width = pct + '%';
  document.getElementById('treeNext').textContent = msg;
  document.getElementById('treeSvg').innerHTML = TREE_SVGS[Math.min(li, TREE_SVGS.length-1)];

//  Calendar
// ─────────────────────────────────────────────
let calY = new Date().getFullYear(), calM = new Date().getMonth();
const MON = ['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];

function renderCal() {
  document.getElementById('calTitle').textContent = `${calY}年 ${MON[calM]}`;
  const eDates = new Set(D.entries.map(e=>e.date));
  const t = todayStr();
  const firstDay = new Date(calY, calM, 1).getDay();
  const dim = new Date(calY, calM+1, 0).getDate();
  const days = ['日','月','火','水','木','金','土'];

  let h = days.map(d=>`<div class="cal-dh">${d}</div>`).join('');
  for (let i=0;i<firstDay;i++) h += `<div class="cal-d none"></div>`;
  for (let d=1;d<=dim;d++) {
    const ds = `${calY}-${String(calM+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const isT = ds===t, hasE = eDates.has(ds);
    h += `<div class="cal-d ${isT?'today':hasE?'has':''}" onclick="showDay('${ds}')">${d}${hasE&&!isT?'<div class="cal-dot"></div>':''}</div>`;
  }
  document.getElementById('calGrid').innerHTML = h;
}

function moveMon(d) {
  calM += d;
  if (calM<0){calM=11;calY--;}
  if (calM>11){calM=0;calY++;}
  renderCal();
}

function showDay(ds) {
  const es = D.entries.filter(e=>e.date===ds);
  if (!es.length) return;
  document.getElementById('sheetDate').textContent = fmtDate(ds)+`（${es.length}件）`;
  document.getElementById('sheetEntries').innerHTML = es.map(e=>`
    <div class="entry-item">
      <div class="entry-text">${esc(e.text)}</div>
      <div class="entry-meta">
        <span class="entry-cat">${e.category}</span>
        <span>${moodE[e.mood]}</span>
        <span class="entry-time">${fmtTime(e.ts)}</span>
      </div>
    </div>`).join('');
  document.getElementById('overlay').classList.add('open');
}
function closeOverlay(ev){ if(ev.target===document.getElementById('overlay')) document.getElementById('overlay').classList.remove('open'); }
function closeOverlayDirect(){ document.getElementById('overlay').classList.remove('open'); }

function renderStats() {
  const n = D.entries.length;
  document.getElementById('statsGrid').innerHTML = [
    {v:n, l:'感謝の総数'},
    {v:D.streak, l:'現在のストリーク'},
    {v:D.best, l:'最高ストリーク'},
    {v:D.tapTotal, l:'ありがとう回数'},
  ].map(s=>`<div class="card stat-box"><div class="stat-big">${s.v}</div><div class="stat-lbl">${s.l}</div></div>`).join('');

  // Category bar
  const cc={};
  D.entries.forEach(e=>{cc[e.category]=(cc[e.category]||0)+1;});
  const maxC=Math.max(...Object.values(cc),1);
  const sorted=Object.entries(cc).sort((a,b)=>b[1]-a[1]);
  document.getElementById('catChart').innerHTML = sorted.length
    ? sorted.map(([c,v])=>{
        const lbl = c.split(' ').slice(1).join(' ') || c;
        return `<div class="bar-row"><div class="bar-lbl">${lbl}</div><div class="bar-track"><div class="bar-fill" style="width:${(v/maxC*100).toFixed(1)}%"></div></div><div class="bar-cnt">${v}</div></div>`;
      }).join('')
    : '<p style="color:var(--text-sub);font-size:13px;text-align:center;padding:8px">まだ記録がありません</p>';

  // Mood bar
  const mc=[0,0,0,0,0,0];
  D.entries.forEach(e=>{if(e.mood>=1&&e.mood<=5)mc[e.mood]++;});
  const maxM=Math.max(...mc,1);
  document.getElementById('moodChart').innerHTML = [1,2,3,4,5].map(m=>
    `<div class="bar-row"><div class="bar-lbl">${moodE[m]}</div><div class="bar-track"><div class="bar-fill" style="width:${(mc[m]/maxM*100).toFixed(1)}%"></div></div><div class="bar-cnt">${mc[m]}</div></div>`
  ).join('');
}

function renderMemory() {
  const past = D.entries.filter(e=>e.date!==todayStr());
  if (!past.length) {
    document.getElementById('memCard').innerHTML=`<div class="empty-state"><div class="empty-icon">💫</div><p>記録を増やすと、過去の感謝が<br>ここに現れます</p></div>`;
    document.getElementById('memReact').style.display='none';
    document.getElementById('memHistory').textContent='記録がありません';
    return;
  }
  const e = past[Math.floor(Math.random()*past.length)];
  document.getElementById('memCard').innerHTML=`
    <div class="memory-inner">
      <div class="mem-date">${fmtDate(e.date)} の感謝</div>
      <div class="mem-text">${esc(e.text)}</div>
      <div class="mem-cat">${e.category} ${moodE[e.mood]}</div>
      <button class="shuffle-btn" onclick="renderMemory()">🔀 別の記憶を見る</button>
    </div>`;
  document.getElementById('memReact').style.display='block';

  // History summary
  const dg={};
  D.entries.forEach(e=>{const m=e.date.slice(0,7);if(!dg[m])dg[m]=new Set();dg[m].add(e.date);});
  document.getElementById('memHistory').innerHTML = Object.entries(dg).sort().reverse().slice(0,8).map(([m,s])=>{
    const [y,mo]=m.split('-');
    const ds=[...s].sort().map(d=>parseInt(d.slice(8))).join('日、')+'日';
    return `<strong>${y}年${MON[parseInt(mo)-1]}</strong>：${ds}`;
  }).join('<br>') || '記録がありません';
}

}

// ─────────────────────────────────────────────
//  All-in-one render
// ─────────────────────────────────────────────
function renderAll() {
  renderCounter(); updateHeader(); renderTodayList(); updatePrompt();
}

// ─────────────────────────────────────────────
//  Init
// ─────────────────────────────────────────────
(function init(){
  if(D.tapDate !== todayStr()) D.tapToday = 0;
  renderAll();
  renderCal();
})();
</script>
</body>
